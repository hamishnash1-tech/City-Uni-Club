name: Android Build

on:
  push:
    branches: [main]
    paths: [cuc-android/**]
  pull_request:
    branches: [main]
    paths: [cuc-android/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cuc-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
