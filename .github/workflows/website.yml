name: Website Build

on:
  push:
    branches: [main]
    paths: [cityuniclub-website/**]
  pull_request:
    branches: [main]
    paths: [cityuniclub-website/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cityuniclub-website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cityuniclub-website/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
