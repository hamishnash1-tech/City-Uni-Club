name: Admin Build

on:
  push:
    branches: [main]
    paths: [cityuniclub-admin/**]
  pull_request:
    branches: [main]
    paths: [cityuniclub-admin/**]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cityuniclub-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cityuniclub-admin/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
